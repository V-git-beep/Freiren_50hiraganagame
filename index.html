<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>魔法の高み</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; width:100vw; height:100vh; font-family:'Noto Serif JP',serif; touch-action:manipulation; }

/* 橫向提示 */
#rotate-notice {
  display:none; position:fixed; inset:0; background:#0a0a1a; z-index:9999;
  flex-direction:column; align-items:center; justify-content:center; color:#fff; gap:20px;
}
#rotate-notice .icon { font-size:60px; animation:rotHint 2s ease-in-out infinite; }
@keyframes rotHint { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(90deg)} }

/* 外層 */
#game-wrapper { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#000; }
#game-canvas  { position:relative; display:flex; flex-direction:row; overflow:hidden; }

/* ==================== 畫面切換 ==================== */
.screen { position:absolute; inset:0; display:none; z-index:5; }
.screen.active { display:block; }

/* ==================== 標題畫面 ==================== */
#title-screen {
  background-size:cover; background-position:center;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
#title-screen.active { display:flex; }
#title-overlay { position:absolute; inset:0; background:linear-gradient(to bottom,rgba(0,0,0,0.25),rgba(0,0,0,0.6)); }
#title-content { position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; }
.title-jp { font-weight:900; color:#fff; text-shadow:0 0 20px #c4b5fd,0 0 40px #7c3aed,2px 2px 0 #000; margin-bottom:8px; }
.title-sub { color:#e9d5ff; letter-spacing:3px; text-shadow:0 0 10px #a78bfa; margin-bottom:24px; }
.title-difflabel { color:#d8b4fe; letter-spacing:5px; margin-bottom:16px; text-shadow:0 0 8px #a78bfa; }
.btn-group { display:flex; flex-direction:column; align-items:center; gap:10px; }
.diff-btn {
  border:none; cursor:pointer; border-radius:5px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Noto Serif JP',serif; font-weight:700; color:#fff; letter-spacing:4px;
  text-shadow:1px 1px 2px #000; transition:transform 0.12s, filter 0.12s;
}
.diff-btn:active { transform:scale(0.96); }
.btn-b1  { background:linear-gradient(135deg,#1e40af,#3b82f6,#93c5fd); box-shadow:0 4px 18px rgba(59,130,246,0.5); }
.btn-b2  { background:linear-gradient(135deg,#065f46,#10b981,#6ee7b7); box-shadow:0 4px 18px rgba(16,185,129,0.5); }
.btn-adv { background:linear-gradient(135deg,#7c2d12,#dc2626,#fca5a5); box-shadow:0 4px 18px rgba(220,38,38,0.5); }
.btn-lv  { background:linear-gradient(135deg,#374151,#6b7280,#d1d5db); box-shadow:0 4px 18px rgba(107,114,128,0.4); }

/* ==================== 遊戲畫面（左＋右）==================== */
#game-screen { display:none; flex-direction:row; }
#game-screen.active { display:flex; }

/* 左：遊戲主區 */
#game-left { position:relative; overflow:hidden; flex-shrink:0; background-size:cover; background-position:center; }

/* 判定線 */
#judge-line {
  position:absolute; top:0; bottom:0; width:3px; z-index:20; pointer-events:none;
  background:repeating-linear-gradient(to bottom,rgba(255,255,100,0.9) 0,rgba(255,255,100,0.9) 12px,transparent 12px,transparent 20px);
  box-shadow:0 0 8px rgba(255,255,100,0.6),0 0 16px rgba(255,255,100,0.3);
}

/* 角色 */
#character { position:absolute; z-index:30; pointer-events:none; }
#character img { display:block; filter:drop-shadow(0 4px 8px rgba(0,0,0,0.5)); }
#character.hit   { animation:hitFlash 1s ease; }
#character.clear { animation:clearBounce 2s ease; }
@keyframes hitFlash   { 0%,100%{opacity:1} 25%,75%{opacity:0.2;filter:drop-shadow(0 0 14px red)} }
@keyframes clearBounce{ 0%,100%{transform:translateY(0)} 25%{transform:translateY(-28px)} 50%{transform:translateY(-8px)} 75%{transform:translateY(-18px)} }
.bounce { animation:clearBounce 0.6s ease 2; }

/* 光束 */
#attack-beam { position:absolute; z-index:25; pointer-events:none; display:none; transform-origin:left center; }
#attack-beam img { width:100%; height:100%; object-fit:fill; mix-blend-mode:lighten; }

/* 五十音圖案 */
.kana-tile { position:absolute; z-index:15; display:flex; align-items:center; justify-content:center; pointer-events:none; }
.kana-tile .frame-img { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; mix-blend-mode:lighten; }
.kana-tile .kana-text {
  position:relative; z-index:2; font-family:'Noto Serif JP',serif; font-weight:900; color:#fff; line-height:1; user-select:none;
  text-shadow:3px 3px 0 #000,-3px -3px 0 #000,3px -3px 0 #000,-3px 3px 0 #000,0 0 12px rgba(220,180,255,0.9);
}
/* 最近目標高亮 */
.kana-tile.target .frame-img { filter:brightness(1.5) drop-shadow(0 0 10px rgba(255,220,80,1)); }
.kana-tile.success { animation:kanaOK   0.4s ease forwards; }
.kana-tile.fail    { animation:kanaFail 0.5s ease forwards; }
@keyframes kanaOK   { 0%{opacity:1;transform:scale(1)} 40%{transform:scale(1.3);filter:brightness(3)} 100%{opacity:0;transform:scale(0)} }
@keyframes kanaFail { 0%{opacity:1;transform:scale(1)} 30%{transform:scale(1.3);filter:hue-rotate(180deg)} 60%{transform:scale(0.8) translateX(-8px)} 100%{opacity:0;transform:scale(0)} }

/* HUD */
#hud {
  position:absolute; top:0; left:0; right:0; z-index:40; pointer-events:none;
  display:flex; align-items:flex-start; justify-content:space-between; padding:8px 12px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.65),transparent);
}
#hearts-container { display:flex; gap:4px; }
.heart { color:#ff3366; filter:drop-shadow(0 0 4px rgba(255,50,100,0.7)); transition:all 0.3s; }
.heart.lost { color:#333; filter:none; opacity:0.4; }
#timer-display { font-family:'Noto Serif JP',serif; font-weight:900; color:#fff; text-shadow:0 0 10px rgba(200,150,255,0.8),1px 1px 2px #000; }
#timer-display.urgent { color:#ff6666; animation:timerPulse 0.5s ease infinite; }
@keyframes timerPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
#diff-badge { font-family:'Noto Serif JP',serif; font-weight:700; color:#d8b4fe; text-shadow:0 0 8px rgba(167,139,250,0.6),1px 1px 2px #000; }

/* 覆蓋訊息（只在遊戲左區）*/
.overlay-msg {
  position:absolute; inset:0; z-index:50; display:flex; flex-direction:column;
  align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.3s;
}
.overlay-msg.show { opacity:1; pointer-events:auto; }
#start-wrap { background:radial-gradient(ellipse at center,rgba(124,58,237,0.45),transparent 70%); }
#clear-wrap  { background:radial-gradient(ellipse at center,rgba(16,185,129,0.35),transparent 70%); }
#over-wrap   { background:radial-gradient(ellipse at center,rgba(220,38,38,0.35),transparent 70%); }
.omsg { font-family:'Noto Serif JP',serif; font-weight:900; color:#fff; letter-spacing:6px; }
#start-omsg { text-shadow:0 0 20px #a78bfa,0 0 40px #7c3aed,2px 2px 0 #000; animation:startAnim 2.5s ease forwards; }
@keyframes startAnim { 0%{opacity:0;transform:scale(0.5)} 25%{opacity:1;transform:scale(1)} 80%{opacity:1} 100%{opacity:0;transform:scale(1.3)} }
#clear-omsg { text-shadow:0 0 20px #6ee7b7,0 0 40px #10b981,2px 2px 0 #000; animation:clearFlash 1.5s ease infinite; }
@keyframes clearFlash { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05);filter:brightness(1.3)} }
#over-omsg  { color:#ff6666; text-shadow:0 0 20px #ef4444,2px 2px 0 #000; }
.back-btn {
  margin-top:20px; padding:10px 32px; background:rgba(255,255,255,0.15);
  border:2px solid rgba(255,255,255,0.5); border-radius:6px; color:#fff;
  font-family:'Noto Serif JP',serif; font-weight:700; letter-spacing:4px;
  cursor:pointer; transition:all 0.2s; pointer-events:auto; text-shadow:1px 1px 2px #000;
}
.back-btn:active { background:rgba(255,255,255,0.3); transform:scale(0.97); }

/* 判定浮現 */
.judge-popup { position:absolute; z-index:45; font-family:'Noto Serif JP',serif; font-weight:900; pointer-events:none; animation:judgePopup 0.8s ease forwards; }
.judge-popup.ok   { color:#86efac; text-shadow:0 0 10px #22c55e; }
.judge-popup.miss { color:#fca5a5; text-shadow:0 0 10px #ef4444; }
@keyframes judgePopup { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-40px) scale(1.3)} }

/* 右：鍵盤區 */
#game-right {
  flex-shrink:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:rgba(8,8,24,0.93); border-left:1px solid rgba(139,92,246,0.3);
  padding:6px 6px;
}
#input-buffer-wrap {
  width:100%; display:flex; align-items:center; justify-content:center;
  margin-bottom:8px;
}
#input-buffer {
  font-family:monospace; font-weight:700; color:#a78bfa; letter-spacing:3px;
  text-align:center; background:rgba(109,40,217,0.2);
  border:1px solid rgba(139,92,246,0.4); border-radius:6px; padding:3px 12px;
  width:90%; min-height:1.4em;
}
#keyboard { display:flex; flex-direction:column; align-items:center; gap:5px; width:100%; }
.key-row { display:flex; justify-content:center; gap:4px; }
.key {
  border-radius:6px; cursor:pointer; font-weight:700; color:#fff;
  background:rgba(109,40,217,0.45); border:1.5px solid rgba(139,92,246,0.55);
  font-family:monospace; letter-spacing:1px;
  display:flex; align-items:center; justify-content:center;
  user-select:none; -webkit-user-select:none;
  transition:background 0.08s, transform 0.08s;
  /* 防止長按選字 */
  -webkit-touch-callout:none; touch-action:manipulation;
}
.key:active, .key.flash { background:rgba(139,92,246,0.85); transform:scale(0.88); }
.key-del { background:rgba(55,65,81,0.6); border-color:rgba(107,114,128,0.5); }

/* ===== 載入畫面 ===== */
#loading-screen {
  position:fixed; inset:0; z-index:99999;
  background:#0a0a1a;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:20px;
}
#loading-screen .load-title {
  font-family:'Noto Serif JP',serif; font-weight:900;
  font-size:28px; color:#c4b5fd;
  text-shadow:0 0 20px #7c3aed;
  letter-spacing:4px;
}
#loading-bar-wrap {
  width:280px; height:14px;
  background:rgba(255,255,255,0.1);
  border-radius:10px; overflow:hidden;
  border:1px solid rgba(139,92,246,0.4);
}
#loading-bar {
  height:100%; width:0%;
  background:linear-gradient(90deg,#7c3aed,#a78bfa);
  border-radius:10px;
  transition:width 0.3s ease;
  box-shadow:0 0 10px rgba(167,139,250,0.6);
}
#loading-text {
  font-size:13px; color:rgba(255,255,255,0.5);
  letter-spacing:2px;
}
</style>
</head>
<body>

<!-- 載入畫面 -->
<div id="loading-screen">
  <div class="load-title">魔法の高み</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <div id="loading-text">読み込み中... 0%</div>
</div>

<div id="rotate-notice">
  <div class="icon">📱</div>
  <p style="font-size:18px;color:#aaa;">デバイスを横向きにしてください</p>
</div>

<div id="game-wrapper">
  <div id="game-canvas">

    <!-- ===== 標題畫面（覆蓋整個 canvas）===== -->
    <div id="title-screen" class="screen active">
      <div id="title-overlay"></div>
      <div id="title-content">
        <div class="title-jp"  id="title-jp-txt">魔法の高み</div>
        <div class="title-sub">～フリーレンと一緒に戦おう～</div>
        <div class="title-difflabel">難易度を選んでください</div>
        <div class="btn-group" id="btn-group"></div>
      </div>
    </div>

    <!-- ===== 遊戲畫面 ===== -->
    <div id="game-screen" class="screen">

      <!-- 左：遊戲主區 -->
      <div id="game-left">
        <div id="judge-line"></div>
        <div id="character">
        <img id="char-img" src="images/frierenstand.webp" alt="">
      </div>
        <div id="attack-beam"><img src="images/attackeffect.png" alt=""></div>
        <div id="hud">
          <div id="hearts-container"></div>
          <div id="timer-display">2:00</div>
          <div id="diff-badge"></div>
        </div>
        <!-- 遊戲覆蓋訊息 -->
        <div id="start-wrap" class="overlay-msg"><div class="omsg" id="start-omsg">ゲームスタート</div></div>
        <div id="clear-wrap" class="overlay-msg">
          <div class="omsg" id="clear-omsg">ゲームクリア！</div>
          <button class="back-btn" id="clear-back-btn">タイトルへ戻る</button>
        </div>
        <div id="over-wrap"  class="overlay-msg">
          <div class="omsg" id="over-omsg">ゲームオーバー</div>
          <button class="back-btn" id="over-back-btn">タイトルへ戻る</button>
        </div>
      </div>

      <!-- 右：鍵盤區 -->
      <div id="game-right">
        <div id="input-buffer-wrap"><div id="input-buffer"></div></div>
        <div id="keyboard"></div>
      </div>

    </div>

  </div>
</div>

<script>
// ============================================================
// 羅馬字對應
// ============================================================
const ROMAJI = {
  'あ':'a','い':'i','う':'u','え':'e','お':'o',
  'か':'ka','き':'ki','く':'ku','け':'ke','こ':'ko',
  'さ':'sa','し':'si','す':'su','せ':'se','そ':'so',
  'た':'ta','ち':'ti','つ':'tu','て':'te','と':'to',
  'な':'na','に':'ni','ぬ':'nu','ね':'ne','の':'no',
  'は':'ha','ひ':'hi','ふ':'hu','へ':'he','ほ':'ho',
  'ま':'ma','み':'mi','む':'mu','め':'me','も':'mo',
  'や':'ya','ゆ':'yu','よ':'yo',
  'ら':'ra','り':'ri','る':'ru','れ':'re','ろ':'ro',
  'わ':'wa','を':'o',
};
const ROMAJI_ALT = {
  'し':['si','shi'],'ち':['ti','chi'],'つ':['tu','tsu'],
  'ふ':['hu','fu'],'を':['o','wo'],
};
function getAccepted(kana) {
  const main = ROMAJI[kana] || '';
  const alt  = ROMAJI_ALT[kana] || [];
  return [...new Set([main, ...alt])].filter(Boolean);
}

// ============================================================
// 難度
// ============================================================
const DIFFICULTY = {
  beginner1:{label:'初級 I',  kana:['あ','い','う','え','お','か','き','く','け','こ','さ','し','す','せ','そ','た','ち','つ','て','と'], totalTiles:40, speed:55, interval:2400, missPixels:80},
  beginner2:{label:'初級 II', kana:['な','に','ぬ','ね','の','は','ひ','ふ','へ','ほ','ま','み','む','め','も','や','ゆ','よ','ら','り','る','れ','ろ','わ','を'], totalTiles:40, speed:60, interval:2400, missPixels:80},
  advanced: {label:'進階',    kana:['あ','い','う','え','お','か','き','く','け','こ','さ','し','す','せ','そ','た','ち','つ','て','と','な','に','ぬ','ね','の','は','ひ','ふ','へ','ほ','ま','み','む','め','も','や','ゆ','よ','ら','り','る','れ','ろ','わ','を'], totalTiles:40, speed:75, interval:2000, missPixels:70},
};

// ============================================================
// 狀態
// ============================================================
let G = {
  phase:'title', diff:null,
  hearts:6, timeLeft:120,
  tiles:[], spawnTimer:null, gameTimer:null,
  queue:[], qIdx:0,
  buf:'',        // 輸入緩衝
  running:false,
};

// ============================================================
// 版面尺寸（由 resize() 計算）
// ============================================================
let VW, VH, LW, RW, JUDGE_X;
const CHAR_W=170, CHAR_H=240, CHAR_X=5, CHAR_BOT=8;
const TS = 100; // TILE_SIZE
const TILE_MIN_Y=50;
let   TILE_MAX_Y;

// ============================================================
// resize：計算版面，按鈕大小等全部依 VH 縮放
// ============================================================
function resize() {
  VW = window.innerWidth;
  VH = window.innerHeight;
  RW = Math.round(Math.min(Math.max(VW*0.27, 170), 250));
  LW = VW - RW;
  TILE_MAX_Y = VH - TS - 50;
  JUDGE_X = CHAR_X + CHAR_W + Math.round(LW * 0.055);

  const canvas = document.getElementById('game-canvas');
  canvas.style.width  = VW+'px';
  canvas.style.height = VH+'px';

  // 標題畫面全寬
  const ts = document.getElementById('title-screen');
  ts.style.width  = VW+'px';
  ts.style.height = VH+'px';

  // 遊戲畫面全寬
  const gs = document.getElementById('game-screen');
  gs.style.width  = VW+'px';
  gs.style.height = VH+'px';

  // 左區
  const gl = document.getElementById('game-left');
  gl.style.width  = LW+'px';
  gl.style.height = VH+'px';

  // 右區
  const gr = document.getElementById('game-right');
  gr.style.width  = RW+'px';
  gr.style.height = VH+'px';

  // 判定線
  document.getElementById('judge-line').style.left = JUDGE_X+'px';

  // 角色
  const char = document.getElementById('character');
  char.style.left   = CHAR_X+'px';
  char.style.bottom = CHAR_BOT+'px';
  const ci = document.getElementById('char-img');
  ci.style.width  = CHAR_W+'px';
  ci.style.height = CHAR_H+'px';
  ci.style.objectFit = 'contain';
  ci.style.objectPosition = 'bottom center';

  // HUD 字型
  const s = VH/600;
  document.getElementById('timer-display').style.fontSize = Math.round(27*s)+'px';
  document.getElementById('diff-badge').style.fontSize    = Math.round(12*s)+'px';
  document.querySelectorAll('.heart').forEach(h => h.style.fontSize = Math.round(22*s)+'px');

  // 標題字型
  document.getElementById('title-jp-txt').style.fontSize = Math.round(36*s)+'px';
  document.querySelectorAll('.title-sub').forEach(e=>e.style.fontSize=Math.round(14*s)+'px');
  document.querySelectorAll('.title-difflabel').forEach(e=>e.style.fontSize=Math.round(13*s)+'px');

  // 覆蓋訊息字型
  ['start-omsg','clear-omsg','over-omsg'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.style.fontSize=Math.round(48*s)+'px';
  });
  document.querySelectorAll('.back-btn').forEach(b=>b.style.fontSize=Math.round(15*s)+'px');

  // 按鈕大小
  const bw=Math.round(Math.min(LW*0.55,240)), bh=Math.round(VH*0.09);
  document.querySelectorAll('.diff-btn').forEach(b=>{
    b.style.width=bw+'px'; b.style.height=bh+'px';
    b.style.fontSize=Math.round(bh*0.33)+'px';
  });

  buildKeyboard();
  checkOri();
}

function checkOri() {
  document.getElementById('rotate-notice').style.display =
    (VW < VH && VW < 900) ? 'flex' : 'none';
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', ()=>setTimeout(resize,300));

// ============================================================
// 鍵盤
// ============================================================
function buildKeyboard() {
  const kbd = document.getElementById('keyboard');
  kbd.innerHTML = '';
  const rows=[['q','w','e','r','t','y','u','i','o','p'],['a','s','d','f','g','h','j','k','l'],['z','x','c','v','b','n','m','⌫']];
  const gap=4, cols=10;
  const kw = Math.floor((RW - gap*(cols+1)) / cols);
  const kh = Math.floor((VH*0.55)/3);
  const fs = Math.max(11, Math.min(17, Math.floor(kw*0.52)));

  rows.forEach(row=>{
    const rowEl=document.createElement('div'); rowEl.className='key-row';
    row.forEach(ch=>{
      const btn=document.createElement('button');
      btn.className='key'+(ch==='⌫'?' key-del':'');
      btn.textContent=ch==='⌫'?'⌫':ch.toUpperCase();
      btn.dataset.ch=ch;
      btn.style.cssText=`width:${kw}px;height:${kh}px;font-size:${fs}px;border:none;`;
      // 用 pointerdown 確保 iOS/Android 都能即時響應
      btn.addEventListener('pointerdown', e=>{ e.preventDefault(); onKey(ch); flashKey(btn); });
      rowEl.appendChild(btn);
    });
    kbd.appendChild(rowEl);
  });

  // input-buffer 字型
  document.getElementById('input-buffer').style.fontSize = Math.round(VH/600*18)+'px';
}

function flashKey(btn) {
  btn.classList.add('flash');
  setTimeout(()=>btn.classList.remove('flash'),120);
}

// ============================================================
// 預載所有資源
// ============================================================
// 載入畫面只等圖片和短音效，BGM 在背景自己下載不阻擋
const ALL_ASSETS = [
  'images/gamebeginingbackground.webp',
  'images/gamebeginbackground.webp',
  'images/frierenstand.webp',
  'images/frierenattack.webp',
  'images/frierenattacked.webp',
  'images/frierenclear.webp',
  'images/frierenfailed.webp',
  'images/attackeffect.png',
  'images/50onframe.png',
  'audio/attack.mp3',
  'audio/attacked.mp3',
  'audio/clear.mp3',
  'audio/fail.mp3',
  // BGM 不在這裡，它在背景自己預載
];

function preloadAll(onComplete) {
  let loaded = 0;
  const total = ALL_ASSETS.length;
  const bar  = document.getElementById('loading-bar');
  const txt  = document.getElementById('loading-text');

  function onLoad() {
    loaded++;
    const pct = Math.round(loaded / total * 100);
    bar.style.width = pct + '%';
    txt.textContent = '読み込み中... ' + pct + '%';
    if (loaded >= total) {
      txt.textContent = '完了！';
      setTimeout(onComplete, 400);
    }
  }

  ALL_ASSETS.forEach(src => {
    if (src.endsWith('.mp3')) {
      const a = new Audio();
      let done = false;
      const finish = () => { if (!done) { done = true; onLoad(); } };
      a.addEventListener('canplay', finish, { once: true });
      a.addEventListener('error',   finish, { once: true });
      setTimeout(finish, 3000); // 3秒內沒反應就跳過
      a.src = src;
    } else {
      const img = new Image();
      let done = false;
      const finish = () => { if (!done) { done = true; onLoad(); } };
      img.onload  = finish;
      img.onerror = finish;
      setTimeout(finish, 5000); // 圖片5秒沒載完就跳過
      img.src = src;
    }
  });
}

// ============================================================
// 初始化
// ============================================================
function init() {
  document.getElementById('title-screen').style.backgroundImage = "url('images/gamebeginingbackground.webp')";
  document.getElementById('game-left').style.backgroundImage    = "url('images/gamebeginbackground.webp')";

  // 按鈕
  const g=document.getElementById('btn-group'); g.innerHTML='';
  [{key:'beginner1',label:'初級 I',cls:'btn-b1'},{key:'beginner2',label:'初級 II',cls:'btn-b2'},
   {key:'advanced',label:'進階',cls:'btn-adv'},{key:'leave',label:'離開',cls:'btn-lv'}].forEach(b=>{
    const btn=document.createElement('button');
    btn.className='diff-btn '+b.cls; btn.textContent=b.label;
    btn.onclick=()=>b.key==='leave'?window.close():startGame(b.key);
    g.appendChild(btn);
  });

  // 回標題按鈕
  document.getElementById('clear-back-btn').onclick = goTitle;
  document.getElementById('over-back-btn').onclick  = goTitle;

  resize();

  // 預載完成後隱藏載入畫面
  preloadAll(() => {
    document.getElementById('loading-screen').style.display = 'none';
  });
}

// ============================================================
// 畫面切換
// ============================================================
function showTitle() {
  document.getElementById('title-screen').classList.add('active');
  document.getElementById('game-screen').classList.remove('active');
}
function showGame() {
  document.getElementById('title-screen').classList.remove('active');
  document.getElementById('game-screen').classList.add('active');
}
function goTitle() {
  stopGame();
  stopBGM();
  hideAllOverlays();
  showTitle();
  G.phase='title';
}

// ============================================================
// 開始遊戲
// ============================================================
function startGame(diffKey) {
  stopGame();
  hideAllOverlays();
  Object.assign(G,{diff:diffKey,hearts:6,timeLeft:120,tiles:[],qIdx:0,running:false,buf:''});
  G.queue = buildQueue(diffKey);
  document.getElementById('input-buffer').textContent='';
  document.getElementById('diff-badge').textContent=DIFFICULTY[diffKey].label;
  document.querySelectorAll('.kana-tile,.judge-popup').forEach(t=>t.remove());
  document.getElementById('attack-beam').style.display='none';
  renderHearts(); updateTimer();
  showChar('stand');
  showGame();
  playBGM();
  showStartMsg();
}

function buildQueue(dk) {
  // 預先生成200個（遠超2分鐘所需），足夠整局不斷流
  const k=DIFFICULTY[dk].kana, total=200, q=[];
  while(q.length<total) q.push(...[...k].sort(()=>Math.random()-0.5));
  return q.slice(0,total);
}

function showStartMsg() {
  const w=document.getElementById('start-wrap');
  const m=document.getElementById('start-omsg');
  // 重設動畫
  m.style.animation='none'; void m.offsetWidth;
  m.style.animation='startAnim 2.5s ease forwards';
  w.classList.add('show');
  setTimeout(()=>{ w.classList.remove('show'); beginGame(); }, 2500);
}

// ============================================================
// 遊戲主體
// ============================================================
function beginGame() {
  G.running=true; G.phase='playing';
  G.gameTimer=setInterval(()=>{
    if(!G.running) return;
    if(--G.timeLeft<=0) triggerClear();
    updateTimer();
  },1000);

  // 第一批：放在能很快飄到判定線的位置
  const spd=DIFFICULTY[G.diff].speed;
  spawnAt(JUDGE_X + spd*3);
  spawnAt(JUDGE_X + spd*7);
  spawnAt(JUDGE_X + spd*11);
  schedNext();
}

function schedNext() {
  if(!G.running) return;
  // 如果 queue 快用完，動態補充
  if(G.qIdx >= G.queue.length - 10) {
    const k=DIFFICULTY[G.diff].kana;
    const extra=[...k].sort(()=>Math.random()-0.5);
    G.queue.push(...extra);
  }
  const d=DIFFICULTY[G.diff];
  const jitter=(Math.random()*300)-150;
  G.spawnTimer=setTimeout(()=>{ spawnAt(LW+TS); schedNext(); }, d.interval+jitter);
}

function spawnAt(startX) {
  if(!G.running) return;
  const kana=G.queue[G.qIdx++];
  let y, tries=0;
  do {
    y=TILE_MIN_Y+Math.random()*(TILE_MAX_Y-TILE_MIN_Y);
    const clash=G.tiles.some(t=>!t.removed && Math.abs(t.y-y)<TS+60);
    if(!clash||++tries>15) break;
  } while(true);

  const el=document.createElement('div');
  el.className='kana-tile';
  el.style.cssText=`width:${TS}px;height:${TS}px;left:${startX}px;top:${y}px;`;
  const fi=document.createElement('img'); fi.className='frame-img'; fi.src='images/50onframe.png';
  const kt=document.createElement('span'); kt.className='kana-text'; kt.textContent=kana;
  kt.style.fontSize=Math.round(TS*0.47)+'px';
  el.appendChild(fi); el.appendChild(kt);
  document.getElementById('game-left').appendChild(el);
  G.tiles.push({el,x:startX,y,kana,judged:false,missTriggered:false,removed:false});
  updateTarget();
}

// ============================================================
// 遊戲迴圈
// ============================================================
let lastT=0;
function loop(ts) {
  const dt=Math.min((ts-lastT)/1000,0.1); lastT=ts;
  if(G.running && G.diff) {
    const {speed,missPixels}=DIFFICULTY[G.diff];
    const toRm=[];
    for(const t of G.tiles) {
      if(t.removed) continue;
      t.x-=speed*dt; t.el.style.left=t.x+'px';
      const cx=t.x+TS/2;
      if(!t.judged&&!t.missTriggered&&cx<JUDGE_X-missPixels){ t.missTriggered=true; triggerMiss(t); }
      if(t.x+TS<-10) toRm.push(t);
    }
    toRm.forEach(rmTile);
    updateTarget();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{ lastT=ts; loop(ts); });

function rmTile(t) {
  if(t.removed) return;
  t.removed=true; t.el.remove();
  G.tiles=G.tiles.filter(x=>x!==t);
}

// ============================================================
// 目標：最靠近判定線的未判定圖案
// ============================================================
function getTarget() {
  return G.tiles
    .filter(t=>!t.judged&&!t.removed&&!t.missTriggered&&t.x+TS/2>JUDGE_X-50)
    .sort((a,b)=>(a.x+TS/2)-(b.x+TS/2))[0]||null;
}
function updateTarget() {
  const tgt=getTarget();
  G.tiles.forEach(t=>{ if(!t.removed) t.el.classList.toggle('target',t===tgt); });
}

// ============================================================
// 鍵盤輸入
// ============================================================
function onKey(ch) {
  if(!G.running) return;
  if(ch==='⌫') {
    G.buf=G.buf.slice(0,-1);
    document.getElementById('input-buffer').textContent=G.buf;
    return;
  }
  G.buf+=ch;
  document.getElementById('input-buffer').textContent=G.buf;
  tryMatch();
}

function tryMatch() {
  const tgt=getTarget();
  if(!tgt) { clearBuf(); return; }

  const buf=G.buf;
  const accepted=getAccepted(tgt.kana);

  // 完全匹配 → 成功，自動清除
  if(accepted.some(r=>buf===r)) {
    clearBuf();
    tgt.judged=true;
    triggerSuccess(tgt);
    return;
  }
  // 部分匹配 → 等待繼續輸入
  if(accepted.some(r=>r.startsWith(buf))) return;

  // 不匹配 → 清除，用最後一個字母重試
  const last=buf.slice(-1);
  G.buf=accepted.some(r=>r.startsWith(last)) ? last : '';
  document.getElementById('input-buffer').textContent=G.buf;
}

function clearBuf() {
  G.buf='';
  document.getElementById('input-buffer').textContent='';
}

// 電腦實體鍵盤
document.addEventListener('keydown',e=>{
  if(!G.running) return;
  if(e.key==='Backspace') { onKey('⌫'); return; }
  if(/^[a-zA-Z]$/.test(e.key)) onKey(e.key.toLowerCase());
});

// ============================================================
// 判定成功 / 失敗
// ============================================================
// 圖片預載（頁面載入時就把所有角色圖抓進快取）
const CHAR_IMGS = {};
['frierenstand','frierenattack','frierenattacked','frierenclear','frierenfailed'].forEach(name => {
  const img = new Image();
  img.src = 'images/' + name + '.png';
  CHAR_IMGS[name] = img;
});

// ============================================================
// 音效系統
// ============================================================
const SFX = {};
const SFX_FILES = {
  attack:   'audio/attack.mp3',
  attacked: 'audio/attacked.mp3',
  clear:    'audio/clear.mp3',
  fail:     'audio/fail.mp3',
};

// 音效池：每個音效預建 4 個 Audio 物件輪流使用，消除解碼延遲
const SFX_POOLS = {};
const POOL_SIZE = 4;
Object.entries(SFX_FILES).forEach(([key, src]) => {
  SFX_POOLS[key] = { pool: [], idx: 0 };
  for (let i = 0; i < POOL_SIZE; i++) {
    const a = new Audio(src);
    a.preload = 'auto';
    a.volume = 0.85;
    // 觸發解碼：靜音播放後立刻暫停，讓瀏覽器提前解碼
    a.play().then(() => { a.pause(); a.currentTime = 0; }).catch(()=>{});
    SFX_POOLS[key].pool.push(a);
  }
});

// BGM
const BGM = new Audio('audio/gameentirebgm.mp3');
BGM.loop = true;
BGM.volume = 0.45;
BGM.preload = 'auto';

function playBGM() {
  BGM.currentTime = 0;
  BGM.play().catch(()=>{});
}

function stopBGM() {
  BGM.pause();
  BGM.currentTime = 0;
}

function playSFX(key) {
  const entry = SFX_POOLS[key];
  if (!entry) return;
  const audio = entry.pool[entry.idx % POOL_SIZE];
  entry.idx++;
  audio.currentTime = 0;
  audio.play().catch(()=>{});
}

let charTimer = null;

function showChar(state) {
  const map = {stand:'frierenstand',attack:'frierenattack',attacked:'frierenattacked',clear:'frierenclear',failed:'frierenfailed'};
  const src = 'images/' + (map[state]||'frierenstand') + '.png';
  document.getElementById('char-img').src = src;
}

function setCharFor(state, ms) {
  clearTimeout(charTimer);
  showChar(state);
  if (ms > 0) {
    charTimer = setTimeout(() => {
      if (G.running) showChar('stand');
    }, ms);
  }
}

function triggerSuccess(t) {
  const cx = t.x+TS/2, cy = t.y+TS/2;

  // 攻擊圖 + 光束，500ms 後回待機
  setCharFor('attack', 500);
  showBeam(cx, cy);
  playSFX('attack');
  showJudge('OK！', cx, cy-30, 'ok');
  t.el.classList.add('success');

  setTimeout(() => {
    rmTile(t);
    document.getElementById('attack-beam').style.display = 'none';
  }, 400);
}

function triggerMiss(t) {
  if (!G.running) return;
  t.el.classList.add('fail');
  setTimeout(() => rmTile(t), 500);

  G.hearts = Math.max(0, G.hearts-1);
  renderHearts();

  // 受擊圖 800ms 後回待機，同時閃爍動畫
  setCharFor('attacked', 800);
  playSFX('attacked');
  const char = document.getElementById('character');
  char.classList.remove('hit');
  void char.offsetWidth;
  char.classList.add('hit');
  setTimeout(() => { char.classList.remove('hit'); }, 800);

  showJudge('MISS', t.x+TS/2, t.y+TS/2, 'miss');
  if (G.hearts <= 0) setTimeout(triggerGameOver, 600);
}

function showBeam(tx,ty) {
  const b=document.getElementById('attack-beam');
  const sx=CHAR_X+CHAR_W-10, sy=VH-CHAR_BOT-CHAR_H*0.55;
  const dx=tx-sx,dy=ty-sy,len=Math.sqrt(dx*dx+dy*dy),ang=Math.atan2(dy,dx)*180/Math.PI;
  b.style.cssText=`left:${sx}px;top:${sy-100}px;width:${len}px;height:200px;transform:rotate(${ang}deg);transform-origin:0 50%;display:block;`;
}

function setChar(s) {
  clearTimeout(charTimer);
  showChar(s);
}

// ============================================================
// 通關 / 失敗
// ============================================================
function triggerClear() {
  if(!G.running) return;
  G.running=false;
  clearInterval(G.gameTimer);
  clearTimeout(G.spawnTimer);
  clearTimeout(charTimer);
  stopBGM();
  playSFX('clear');
  setChar('clear');
  document.getElementById('character').classList.add('clear');
  document.getElementById('clear-wrap').classList.add('show');
  G.tiles.forEach(t=>{ t.judged=true; });
}
function triggerGameOver() {
  if(!G.running) return;
  G.running=false;
  clearInterval(G.gameTimer);
  clearTimeout(G.spawnTimer);
  clearTimeout(charTimer);
  stopBGM();
  playSFX('fail');
  setChar('failed');
  document.getElementById('over-wrap').classList.add('show');
  G.tiles.forEach(t=>{ t.judged=true; });
}

// ============================================================
// HUD
// ============================================================
function renderHearts() {
  const c=document.getElementById('hearts-container'); c.innerHTML='';
  const s=VH/600;
  for(let i=0;i<6;i++){
    const h=document.createElement('span'); h.className='heart'+(i>=G.hearts?' lost':'');
    h.textContent='❤'; h.style.fontSize=Math.round(22*s)+'px';
    c.appendChild(h);
  }
}
function updateTimer() {
  const el=document.getElementById('timer-display');
  el.textContent=Math.floor(G.timeLeft/60)+':'+String(G.timeLeft%60).padStart(2,'0');
  el.classList.toggle('urgent',G.timeLeft<=30);
}
function showJudge(text,x,y,type) {
  const el=document.createElement('div'); el.className='judge-popup '+type; el.textContent=text;
  el.style.cssText=`left:${x-20}px;top:${y-20}px;font-size:24px;`;
  document.getElementById('game-left').appendChild(el);
  setTimeout(()=>el.remove(),800);
}

// ============================================================
// 工具
// ============================================================
function stopGame() {
  clearTimeout(G.spawnTimer); clearInterval(G.gameTimer);
  G.tiles.forEach(t=>{ try{t.el.remove()}catch(e){} });
  G.tiles=[];
  document.querySelectorAll('.kana-tile,.judge-popup').forEach(t=>t.remove());
  document.getElementById('attack-beam').style.display='none';
  clearBuf();
}
function hideAllOverlays() {
  ['start-wrap','clear-wrap','over-wrap'].forEach(id=>document.getElementById(id).classList.remove('show'));
}

// ============================================================
// 啟動
// ============================================================
init();
</script>
